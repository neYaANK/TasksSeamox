services:
  springapi:
    image: 'seamox-task3:latest'
    depends_on:
      - database
    ports:
      - '5432:5432'
      - '8080:8080'
    environment:
      - 'DB_PASSWORD=root'
      - 'DB_URL=jdbc:postgresql://database:5432/task2'
      - 'DB_USER=postgres'
      - 'KEY=$KEY'
      - 'SMTP_PASSWORD=$SMTP_PASSWORD'
      - 'SMTP_USERNAME=$SMTP_USERNAME'
      - 'PORT=8080'
      - 'ADDRESS=0.0.0.0'
  database:
    image: 'postgres:17.4'
    restart: always
    volumes:
      - db:/var/lib/postgresql/data
    environment:
      - 'POSTGRES_PASSWORD=root'
      - 'POSTGRES_DB=task2'
volumes:
  db:
    driver: local