spring.application.name=Task2

spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.user=${DB_USER}
spring.flyway.password=${DB_PASSWORD}
spring.flyway.url=${DB_URL}
server.port=${PORT}
server.address=${ADDRESS}

spring.docker.compose.enabled=true


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.hikari.auto-commit=false
logging.level.sql = info
logging.level.web = debug

#Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug = false

spring.mail.password=${SMTP_PASSWORD}
spring.mail.username=${SMTP_USERNAME}

spring.cloud.aws.s3.endpoint=${S3_ENDPOINT}
spring.cloud.aws.s3.region=eu-central-1
spring.cloud.aws.sqs.endpoint=${SQS_ENDPOINT}
spring.cloud.aws.sqs.region=eu-central-1

#S3 Mock has no proper readiness check so I disable it for the sake of simplicity
spring.docker.compose.readiness.wait=never
spring.profiles.active=dev

#Symmetric key
neya.key = ${KEY}
neya.public.url = localhost:8080
neya.login.attempts = 5
neya.login.locktime = 30
neya.scheduler.delay = 3600
neya.verification.sender=${SENDER_EMAIL}
neya.s3.thumbnail.bucket=UserImages