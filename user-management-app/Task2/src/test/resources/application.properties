spring.application.name=Task2
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.hikari.auto-commit=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url = jdbc:h2:mem:task2;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;
spring.data.jdbc.dialect=postgresql

#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE
logging.level.root = info
logging.level.sql = info


spring.mail.host=127.0.0.1
spring.mail.port=3025
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=false

spring.mail.password=admin
spring.mail.username=user

#spring.cloud.aws.s3.endpoint=http://s3mock:9090
#spring.cloud.aws.s3.region=eu-central-1
spring.profiles.active=test

neya.public.url = localhost:8080
#Symmetric key for testing
neya.key = 
neya.login.attempts = 5
neya.login.locktime = 30
neya.scheduler.delay = 5
neya.verification.sender=admin@mail.com
neya.s3.thumbnail.bucket=UserImages
